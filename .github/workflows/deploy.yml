name: Deploy to cPanel

# Tự động build + đẩy lên VinaHost cPanel mỗi khi có code mới trên nhánh main.
on:
  push:
    branches: [main]
  workflow_dispatch: {} # cho phép bấm chạy tay trong tab Actions

# Không cho 2 lần deploy chạy chồng nhau; lần mới hủy lần cũ đang chạy.
concurrency:
  group: deploy-cpanel
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (standalone)
        env:
          NEXT_TELEMETRY_DISABLED: "1"
          # Sheet công khai — set ở build để trang Góc nhìn prerender đúng dữ liệu.
          GOOGLE_SHEET_ID: 1_cPgwf2e7ChPpl8azuNh2K1ki-oBp98Nwd2jqfpRHqY
          GOOGLE_SHEET_NEWS_TAB: News
          GOOGLE_SHEET_VIDEOS_TAB: Videos
        run: npm run build

      - name: Assemble standalone bundle
        run: |
          set -e
          # Next standalone không tự copy static/public — phải gộp vào.
          cp -r .next/static .next/standalone/.next/static
          cp -r public .next/standalone/public
          # Gỡ sharp (file nhị phân theo OS) — đã tắt tối ưu ảnh nên không cần.
          rm -rf .next/standalone/node_modules/sharp .next/standalone/node_modules/@img
          # Không đẩy .env (biến môi trường set trong cPanel).
          rm -f .next/standalone/.env
          # Đổi tmp/restart.txt mỗi lần deploy -> Passenger tự khởi động lại.
          mkdir -p .next/standalone/tmp
          echo "deployed $GITHUB_SHA at $(date -u +%FT%TZ)" > .next/standalone/tmp/restart.txt

      - name: Deploy to cPanel via FTPS (lftp, auto-reconnect)
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          set -e
          sudo apt-get update -qq && sudo apt-get install -y -qq lftp
          # lftp: tự reconnect khi server ngắt (FIN packet), so sánh theo size
          # nên bỏ qua file đã upload -> tiếp tục từ chỗ dở, không làm lại từ đầu.
          # Account FTP đã giới hạn trong thư mục app -> upload thẳng vào "./".
          lftp -u "$FTP_USERNAME","$FTP_PASSWORD" "ftp://$FTP_SERVER" -e "
            set ftp:ssl-force true;
            set ftp:ssl-protect-data true;
            set ssl:verify-certificate no;
            set net:max-retries 10;
            set net:persist-retries 10;
            set net:timeout 20;
            set net:reconnect-interval-base 5;
            set ftp:use-mlsd true;
            set mirror:parallel-transfer-count 2;
            set cmd:fail-exit true;
            mirror -R --ignore-time --no-perms --no-symlinks .next/standalone/ ./;
            mkdir -f tmp;
            put .next/standalone/tmp/restart.txt -o tmp/restart.txt;
            put .next/standalone/server.js -o server.js;
            bye
          "
