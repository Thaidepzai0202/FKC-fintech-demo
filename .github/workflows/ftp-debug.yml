name: FTP Debug

on:
  workflow_dispatch: {}

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - name: Inspect FTP login dir vs app root
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq lftp
          lftp -u "$FTP_USERNAME","$FTP_PASSWORD" "ftp://$FTP_SERVER" -e "
            set ftp:ssl-force true;
            set ftp:ssl-protect-data true;
            set ssl:verify-certificate no;
            set ftp:use-mlsd true;
            echo '===== 1. LOGIN DIR (pwd) =====';
            pwd;
            echo '===== 2. LS of login dir =====';
            ls;
            echo '===== 3. Try cd to ABSOLUTE app root =====';
            cd /home/edpmjmha/trader-evaluation && pwd && echo '--- ls app root ---' && ls || echo '>>> CD TO ABSOLUTE FAILED (account is chrooted)';
            echo '===== 4. Try cd to filesystem root / =====';
            cd / && pwd && echo '--- ls / ---' && ls || echo '>>> cd / failed';
            bye
          "
