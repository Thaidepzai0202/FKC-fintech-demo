services:
  - type: web
    name: trader-evaluation
    runtime: node
    plan: free
    region: singapore
    branch: main
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npm run start
    healthCheckPath: /
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 22.12.0
      - key: NEXT_TELEMETRY_DISABLED
        value: "1"
      - key: DATABASE_URL
        sync: false
      - key: NEXTAUTH_SECRET
        generateValue: true
      - key: NEXTAUTH_URL
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM
        sync: false
      # Google Sheets — dữ liệu trang Góc nhìn thị trường (sheet công khai, không phải bí mật)
      - key: GOOGLE_SHEET_ID
        value: 1_cPgwf2e7ChPpl8azuNh2K1ki-oBp98Nwd2jqfpRHqY
      - key: GOOGLE_SHEET_NEWS_TAB
        value: News
      - key: GOOGLE_SHEET_VIDEOS_TAB
        value: Videos